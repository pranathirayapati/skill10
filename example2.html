<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
window.onload=function(){
    localStorage.removeItem('test1');
    localStorage.removeItem('test2');
    localStorage.removeItem('test3');

}

        function testcount(link){
            let count=localStorage.getItem(link)?parseInt(localStorage.getItem(link)):0;
            localStorage.setItem(link,count+1);
        }

        function showcount(){
            let test1count=localStorage.getItem('test1')?localStorage.getItem('test1'):0;
            let test2count=localStorage.getItem('test2')?localStorage.getItem('test2'):0;
            let test3count=localStorage.getItem('test3')?localStorage.getItem('test3'):0;
            alert(test1 is clicked ${test1count} times: \n test2 is clciked ${test2count} times: \n test3 is clicked ${test3count} times: );

        }
    </script>
    <a href="#" onclick="testcount('test1')">test1</a> <br> <br>
    <a href="#" onclick="testcount('test2')">test2</a> <br> <br>
    <a href="#" onclick="testcount('test3')">test3</a> <br> <br>
    <button onclick="showcount()">click me</button>


</body>
</html>
